<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>正在查找附近公園...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="text-align:center;margin-top:80px;font-family:Arial;">

<h2>正在為您查找附近的公園...</h2>
<p id="status">正在檢查定位權限</p>

<script>
window.onload = function () {

    const fallbackUrl = "https://tour.ibon.com.tw/event/6982deb7f774864bb7f134e5";
    const fallbackUrlAfter4th = "https://meridianproject.kktix.cc/events/1eeaae7e";
    const status = document.getElementById("status");

    // 檢查當前日期是否已超過2026/03/31
    const currentDate = new Date();
    const cutoffDate = new Date(2026, 2, 31); // 月份從0開始，所以3月是2
    const urlToUse = currentDate > cutoffDate ? fallbackUrlAfter4th : fallbackUrl;

    if (!navigator.geolocation) {
        window.location.replace(urlToUse);
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            const googleUrl = `https://www.google.com/maps/search/公園/@${lat},${lng},18z`;

            window.location.replace(googleUrl);
        },
        function (error) {
            // 拒絕、失敗、超時 都會進這裡
            window.location.replace(urlToUse);
        },
        {
            enableHighAccuracy: true,
            timeout: 8000,
            maximumAge: 0
        }
    );
};
</script>

</body>
</html>
