<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>正在查找最近公園...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }
    </style>
</head>
<body>

<h2>正在為您查找最近的公園...</h2>
<p id="status">請允許定位權限</p>

<script>
window.onload = function () {

    const status = document.getElementById("status");

    if (!navigator.geolocation) {
        status.innerText = "瀏覽器不支援定位功能";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // Google Maps 搜尋網址（完全免費）
            const url = `https://www.google.com/maps/search/公園/@${lat},${lng},17z`;

            // 直接跳轉
            window.location.replace(url);
        },
        function (error) {
            status.innerText = "定位失敗：" + error.message;
        },
        {
            enableHighAccuracy: true,
            timeout: 10000
        }
    );
};
</script>

</body>
</html>
